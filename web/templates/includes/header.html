{% load static %}
{% load i18n %}

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="{% url 'homepage:index' %}">Elesey</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  <div class="d-flex flex-column flex-lg-row align-items-center gap-2 gap-lg-3" style="padding-right: 20px;">
    <div class="language-switcher">
        <div class="dropdown">
            <button class="btn btn-outline-light btn-sm dropdown-toggle d-flex align-items-center"
                    type="button"
                    data-bs-toggle="dropdown">
                {% get_current_language as LANGUAGE_CODE %}
                {% if LANGUAGE_CODE == 'ru' %}
                🇷🇺
                {% else %}
                🇺🇸
                {% endif %}
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <form action="{% url 'set_language' %}" method="post">
                        {% csrf_token %}
                        <input name="next" type="hidden" value="{{ request.get_full_path }}">

                        <button type="submit" name="language" value="ru"
                                class="dropdown-item {% if LANGUAGE_CODE == 'ru' %}active{% endif %}">
                            <span class="me-2">🇷🇺</span> Русский
                            {% if LANGUAGE_CODE == 'ru' %}{% endif %}
                        </button>

                        <button type="submit" name="language" value="en"
                                class="dropdown-item {% if LANGUAGE_CODE == 'en' %}active{% endif %}">
                            <span class="me-2">🇺🇸</span> English
                            {% if LANGUAGE_CODE == 'en' %}{% endif %}
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
  </div>
  </nav>
</header>
