{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="ru" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{% static 'img/fav/favicon.ico' %}" type="image">
    <link rel="apple-touch-icon"
          sizes="180x180"
          href="{% static 'img/fav/apple-touch-icon.png' %}">
    <link rel="icon"
          type="image/png"
          sizes="32x32"
          href="{% static 'img/fav/favicon-32x32.png' %}">
    <link rel="icon"
          type="image/png"
          sizes="16x16"
          href="{% static 'img/fav/favicon-16x16.png' %}">
    <link rel="icon"
          type="image/png"
          sizes="96x96"
          href="{% static 'img/fav/favicon-96x96.png' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>
      {% block title %}{% endblock %}
    </title>
  </head>
  <body class="d-flex flex-column h-100">
    {% include "includes/header.html" %}
    <main class="pt-5 my-5 flex-grow-1">
      <div class="container">
        {% block content %}
          <img class="img-fluid" src="{% static "img/pretty_cat.jpg" %}">
          <p>{% trans "Контент_не_подвезли" %}</p>
        {% endblock %}
      </div>
    </main>
    {% include "includes/footer.html" %}
  </body>
  <script src="{% static 'js/bootstrap.min.js' %}"></script>
</html>
