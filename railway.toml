[build]
builder = "nixpacks"
pkgs = ["python311", "gcc", "postgresql"]
buildCommand = "pip install -r requirements.txt && cd web && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd web && python manage.py runserver 0.0.0.0:8000"

restartPolicyType = "ON_FAILURE"
maxRetryCount = 3

[env]
NIXPACKS_PYTHON_VERSION = "3.11"
NODE_ENV = "production"